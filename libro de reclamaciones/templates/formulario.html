<!DOCTYPE html>
<html>
<head>
    <title>Magui Show - Libro de Reclamaciones</title>
</head>

<body style="background-color: #f9f4f8; font-family: Arial; margin: 0;">

    <!-- CONTENEDOR -->
    <div style="
        width: 400px;
        margin: 50px auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        text-align: center;
    ">

        <!-- LOGO -->
        <img src="/static/logo.png" width="250">

        <!-- TITULOS -->
        <h2 style="color: #333;">Magui Show</h2>
        <h3 style="color: #555;">Libro de Reclamaciones</h3>

        <!-- FORMULARIO -->
        <form action="/enviar" method="post">

            <input type="text" name="nombre" placeholder="Nombre completo" required
            style="width: 90%; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ccc;">

            <input type="text" name="dni" placeholder="DNI" required
            style="width: 90%; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ccc;">

            <textarea name="mensaje" placeholder="Escribe tu reclamo..." required
            style="width: 90%; padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>

            <br>

            <button type="submit" style="
                background-color: #0d6efd;
                color: white;
                padding: 10px 20px;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                margin-top: 10px;
            ">
                Enviar Reclamo
            </button>

        </form>

    </div>

</body>
</html>
