<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Rosita 💖</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            background: linear-gradient(-45deg, #fffafa, #ffeef5, #fff5f8);
            background-size: 400% 400%;
            animation: fondo 12s ease infinite;
        }

        @keyframes fondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .contenedor {
            margin-top: 50px;
        }

        h1 {
            color: #ff4d88;
        }

        h2 {
            color: #cc3366;
        }

        img {
            width: 350px;
            border-radius: 15px;
            margin: 20px auto;
            display: block;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            background: #ff4d88;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff1a66;
            transform: scale(1.05);
        }

        #frase {
            margin-top: 20px;
            font-size: 24px;
            color: #333;
            min-height: 30px;
        }

        /* pantalla inicial */
        #inicio {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff5f8;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #inicio button {
            font-size: 22px;
        }

        /* corazones */
        .corazones::before {
            content: "💖 💕 💗 💓 💞";
            position: fixed;
            top: 100%;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 24px;
            animation: flotar 10s linear infinite;
            opacity: 0.6;
        }

        @keyframes flotar {
            0% { top: 100%; }
            100% { top: -10%; }
        }
    </style>
</head>

<body>

    <!-- Pantalla inicial -->
    <div id="inicio">
        <h1>💌 Presiona el botón :v</h1>
        <button onclick="abrirCarta()">Abrir</button>
    </div>

    <!-- Contenido -->
    <div class="contenedor" id="contenido" style="display:none;">

        <h2>Rositaaaaaaa xd 💕</h2>
        <h1>Presiona el botón de nuevo :v 💖</h1>

        <!-- Imagen correcta -->
        <img src="{{ url_for('static', filename='imagen.jpg') }}">

        <button onclick="mostrarFrase()">Haz click aquí</button>

        <div id="frase"></div>

        <div class="corazones"></div>
    </div>

    <script>
        let indice = 0;

        const frases = [
            "Tú puedes, no te estreses, respira hondo y relajate 💪",
            "Eres increíble, eres la mejor administradora, no dudes de eso ✨",
            "Lo estás haciendo bien, sigue así ❤️",
            "Por cierto, ya aprendí a programar :v xd",
            "No te olvides que tenemos que ver spiderman :v",
            "Te quiero corazón de melón ❤️, ahora si ya dejo de molestar xd, me despido, cambio y fuera, bai :v"
        ];

        function abrirCarta() {
            document.getElementById("inicio").style.display = "none";
            document.getElementById("contenido").style.display = "block";
        }

        function escribirTexto(texto, elemento, i = 0) {
            if (i < texto.length) {
                elemento.innerHTML += texto.charAt(i);
                setTimeout(() => escribirTexto(texto, elemento, i + 1), 40);
            }
        }

        function mostrarFrase() {
            const fraseElemento = document.getElementById("frase");
            fraseElemento.innerHTML = "";

            escribirTexto(frases[indice], fraseElemento);

            indice++;
            if (indice >= frases.length) {
                indice = 0;
            }
        }
    </script>

</body>
</html>
